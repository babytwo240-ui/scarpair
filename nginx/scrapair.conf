# Scrapair Nginx Configuration for Production
# Location: /etc/nginx/sites-available/scrapair

# Upstream backend servers (load balancer)
upstream scrapair_backend {
    least_conn;
    server backend1:5000 max_fails=3 fail_timeout=30s;
    server backend2:5000 max_fails=3 fail_timeout=30s;
    server backend3:5000 max_fails=3 fail_timeout=30s;
    
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $http_x_forwarded_for zone=image_upload_limit:10m rate=5r/m;

# Cache settings for images from S3
proxy_cache_path /var/cache/nginx/images levels=1:2 keys_zone=image_cache:100m max_size=10g inactive=60d use_temp_path=off;

server {
    listen 80;
    server_name api.scrapair.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.scrapair.com;

    # SSL Certificates (use Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/api.scrapair.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.scrapair.com/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    # Client max body size (for image uploads - 5MB)
    client_max_body_size 5M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ===========================
    # API ENDPOINTS (Rate Limited)
    # ===========================
    location /api/ {
        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;

        # Proxy settings
        proxy_pass http://scrapair_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Keepalive
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Buffer settings for better performance
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # ===========================
    # IMAGE UPLOAD ENDPOINTS
    # ===========================
    location /api/images/upload {
        # Strict rate limiting for uploads
        limit_req zone=image_upload_limit burst=2 nodelay;

        # Only allow POST
        limit_except POST {
            deny all;
        }

        # Proxy settings
        proxy_pass http://scrapair_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Higher timeouts for uploads
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # ===========================
    # WEBSOCKET (Socket.IO)
    # ===========================
    location /socket.io {
        # No rate limiting for WebSocket
        proxy_pass http://scrapair_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout (longer than HTTP)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ===========================
    # STATIC FILES (Future use)
    # ===========================
    location /static/ {
        alias /var/www/scrapair/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ===========================
    # HEALTH CHECK
    # ===========================
    location /health {
        access_log off;
        proxy_pass http://scrapair_backend;
        proxy_http_version 1.1;
    }

    # ===========================
    # LOGGING
    # ===========================
    access_log /var/log/nginx/scrapair_access.log combined buffer=256k;
    error_log /var/log/nginx/scrapair_error.log warn;

    # Log format with upstream response time
    log_format upstreamlog '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          'rt=$request_time uct="$upstream_connect_time" '
                          'uht="$upstream_header_time" urt="$upstream_response_time"';
}

# ===========================
# REDIRECT for www subdomain
# ===========================
server {
    listen 443 ssl http2;
    server_name www.api.scrapair.com;
    ssl_certificate /etc/letsencrypt/live/api.scrapair.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.scrapair.com/privkey.pem;
    return 301 https://api.scrapair.com$request_uri;
}
